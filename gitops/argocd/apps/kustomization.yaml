apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - project-apps.yaml
  - project-platform.yaml
  - application-monitoring-stack.yaml
  - application-monitoring-config.yaml
  - application-eck-operator.yaml
  - application-elastic-stack.yaml
  - application-sock-shop-core.yaml
  - application-sock-shop-frontend.yaml
  - application-apm-demo.yaml
configMapGenerator:
  - name: repo-settings
    envs:
      - ../repository-url.env
generatorOptions:
  disableNameSuffixHash: true
replacements:
  - source:
      kind: ConfigMap
      name: repo-settings
      fieldPath: data.REPO_URL
    targets:
      - select:
          kind: Application
          name: monitoring-config
        fieldPaths:
          - spec.source.repoURL
      - select:
          kind: Application
          name: elastic-stack
        fieldPaths:
          - spec.source.repoURL
      - select:
          kind: Application
          name: sock-shop-core
        fieldPaths:
          - spec.source.repoURL
      - select:
          kind: Application
          name: sock-shop-frontend
        fieldPaths:
          - spec.source.repoURL
      - select:
          kind: Application
          name: apm-demo
        fieldPaths:
          - spec.source.repoURL
