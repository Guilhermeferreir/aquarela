apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sock-shop-core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: '30'
spec:
  project: aquarela-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: sock-shop
  source:
    repoURL: https://github.com/CHANGE-ME/aquarela.git
    targetRevision: HEAD
    path: gitops/apps/sock-shop/core
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
