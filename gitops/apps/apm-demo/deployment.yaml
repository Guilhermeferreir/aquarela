apiVersion: apps/v1
kind: Deployment
metadata:
  name: apm-demo
  labels:
    app.kubernetes.io/name: apm-demo
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: apm-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apm-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apm-demo
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: apm-demo
    spec:
      containers:
        - name: apm-demo
          image: ghcr.io/guilhermeferreir/aquarela-apm-demo:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: '3000'
            - name: ELASTIC_APM_SERVICE_NAME
              value: aquarela-apm-demo
            - name: ELASTIC_APM_ENVIRONMENT
              value: prod
            - name: ELASTIC_APM_SERVER_URL
              value: http://apm-server-apm-http.elastic-stack.svc:8200
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: apm-demo
  labels:
    app.kubernetes.io/name: apm-demo
    app.kubernetes.io/part-of: apm-demo
spec:
  selector:
    app.kubernetes.io/name: apm-demo
  ports:
    - name: http
      port: 3000
      targetPort: http

