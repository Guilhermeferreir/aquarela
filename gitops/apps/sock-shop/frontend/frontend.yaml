apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-end
  labels:
    app.kubernetes.io/name: front-end
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: sock-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: front-end
  template:
    metadata:
      labels:
        app.kubernetes.io/name: front-end
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: sock-shop
    spec:
      containers:
        - name: front-end
          image: weaveworksdemos/front-end:0.3.12
          env:
            - name: SESSION_REDIS
              value: 'true'
          ports:
            - name: http
              containerPort: 8079
          resources:
            requests:
              cpu: 100m
              memory: 300Mi
            limits:
              cpu: 300m
              memory: 1000Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: front-end
  labels:
    app.kubernetes.io/name: front-end
    app.kubernetes.io/part-of: sock-shop
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: front-end
  ports:
    - name: http
      port: 80
      targetPort: http
