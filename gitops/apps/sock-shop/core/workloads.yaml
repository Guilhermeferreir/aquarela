apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts
  labels:
    app.kubernetes.io/name: carts
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: carts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carts
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: sock-shop
    spec:
      containers:
        - name: carts
          image: weaveworksdemos/carts:0.4.8
          ports:
            - name: http
              containerPort: 80
          env:
            - name: JAVA_OPTS
              value: -Xms64m -Xmx128m -XX:+UseG1GC -Djava.security.egd=file:/dev/urandom -Dspring.zipkin.enabled=false
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 300m
              memory: 500Mi
---
apiVersion: v1
kind: Service
metadata:
  name: carts
  labels:
    app.kubernetes.io/name: carts
    app.kubernetes.io/part-of: sock-shop
spec:
  selector:
    app.kubernetes.io/name: carts
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts-db
  labels:
    app.kubernetes.io/name: carts-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: carts-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carts-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: sock-shop
    spec:
      containers:
        - name: carts-db
          image: mongo:7.0
          ports:
            - name: mongo
              containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: carts-db
  labels:
    app.kubernetes.io/name: carts-db
    app.kubernetes.io/part-of: sock-shop
spec:
  selector:
    app.kubernetes.io/name: carts-db
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  labels:
    app.kubernetes.io/name: catalogue
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalogue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalogue
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: sock-shop
    spec:
      containers:
        - name: catalogue
          image: weaveworksdemos/catalogue:0.3.5
          ports:
            - name: http
              containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 100Mi
            limits:
              cpu: 200m
              memory: 200Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  labels:
    app.kubernetes.io/name: catalogue
    app.kubernetes.io/part-of: sock-shop
spec:
  selector:
    app.kubernetes.io/name: catalogue
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-db
  labels:
    app.kubernetes.io/name: catalogue-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalogue-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalogue-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: sock-shop
    spec:
      containers:
        - name: catalogue-db
          image: weaveworksdemos/catalogue-db:0.3.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: fake_password
            - name: MYSQL_DATABASE
              value: socksdb
          ports:
            - name: mysql
              containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue-db
  labels:
    app.kubernetes.io/name: catalogue-db
    app.kubernetes.io/part-of: sock-shop
spec:
  selector:
    app.kubernetes.io/name: catalogue-db
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
