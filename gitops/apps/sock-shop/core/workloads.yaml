    app.kubernetes.io/part-of: sock-shop
spec:
  selector:
    app.kubernetes.io/name: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: metrics
      port: 9419
      targetPort: metrics
